<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squid Game</title>
    <link href="css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
   <div class="blur one"></div>
   <div class="blur two"></div>
   
   <nav>
    <div class="logo">
        <img src="images/logo.png" alt="Squad Game">
    </div>

    <ul>
        <li><a href="#">About</a></li>
        <li><a href="#">Watch Now</a></li>
        <li><a href="#">Actors</a></li>
        <li><a href="#">Contact</a></li>
    </ul>

    <i class="fa-solid fa-bars"></i>
   </nav>

   <section class="hero">

    <div class="left">
        <img class="title-logo" src="images/logo.png" alt="">

        <p>
          Action / Thriller / Drama Series directed by Dong-hyuk Hwang
          <br />
          Season 1 • 9 Episodes
        </p>

         <div class="buttons">
          <button class="play">
            <i class="fa-solid fa-play"></i>

            Play Now
          </button>

          <button class="trailer">
            <i class="fa-solid fa-play"></i>

            Watch Trailer
          </button>
        </div>
      </div>
    </div>
   </section>

   <section class="gallery">
        <div class="card">
          <img
            src="https://i.pinimg.com/736x/e9/d7/c4/e9d7c4f2075f1b602eb170285299070b.jpg"
            alt="Squid-Game-Pic"
          />
          <i class="fa-solid fa-circle-play"></i>
      </div>

      <div class="card">
        <img
          src="https://i.pinimg.com/736x/43/c1/ea/43c1eadae822a039ccce5899064ed8c6.jpg"
          alt="Squid-Game-Pic"
        />

        <i class="fa-solid fa-circle-play"></i>
      </div>

      <div class="card">
        <img
          src="https://res.cloudinary.com/jerrick/image/upload/d_642250b563292b35f27461a7.png,f_jpg,fl_progressive,q_auto,w_1024/676ce6d372b783001d0921e0.jpg"
          alt="Squid-Game-Pic"
        />

        <i class="fa-solid fa-circle-play"></i>
      </div>
   </section>
</body>
</html>
